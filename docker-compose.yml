services:
  mysql:
    image: mysql:8.4
    container_name: hello-world-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hello_world
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

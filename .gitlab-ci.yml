stages:
  - deploy

variables:
  DEPLOY_USER: gitlab

deploy_production:
  stage: deploy
  image: alpine:3.22
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # SSH_PRIVATE_KEY must be configured in GitLab as a File variable.
    - install -m 600 "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    # SSH_KNOWN_HOSTS should contain the trusted, complete output of ssh-keyscan.
    - install -m 644 "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
  script:
    - >-
      rsync -az --delete
      --exclude=".git"
      --exclude=".env"
      --exclude=".venv"
      --exclude="shared/"
      --chmod=Du=rwx,Dg=rwx,Do=rx,Fu=rw,Fg=rw,Fo=r
      -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes"
      ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/hello-world/app/"
    - >-
      ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes
      "${DEPLOY_USER}@${DEPLOY_HOST}"
      "cd /var/www/hello-world &&
      .venv/bin/pip install -r app/requirements.txt &&
      sudo systemctl restart python-hello-world &&
      sudo systemctl status python-hello-world --no-pager"
